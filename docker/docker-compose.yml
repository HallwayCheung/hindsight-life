version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: regret-pill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: regret-pill-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: regret
      POSTGRES_PASSWORD: regret_dev_2024
      POSTGRES_DB: regret_pill
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regret -d regret_pill"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  postgres_data:
